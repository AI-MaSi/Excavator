# servo control
#
# IMPORTANT: Keep output_channel values contiguous (no gaps between channels)!
# The PWM driver writes all channels in a single I2C transaction from min to max.
# Gaps waste I2C bandwidth. Current layout: ch 2-6 = 21 bytes per write.
# With gaps (e.g. ch 2-5 + ch 9) would need 33 bytes or multiple transactions.

# PCA9685 output signal frequency (Hz). Pulse widths and deadbands are tuned for this rate.
pwm_frequency: 200

CHANNEL_CONFIGS:

    pump:
        output_channel: 9
        pulse_min: 1000
        pulse_max: 1650
        static_pulse_us: 1510  # fixed pulse width (us) used when auto mode is off
        base_pulse_us: 1480    # idle pulse (us) in auto mode with no valve activity
        activity_gain_us: 80  # extra us added at full average valve activity in auto mode


    lift_boom:
        output_channel: 3  # output pin on the servo board
        affects_pump: True # whether moving this servo affects the pump speed (if set to variable)
        toggleable: False  # whether this servo can be toggled on/off via call
        center: 1590       # center pulse width in microseconds. Calculated automatically between min/max if set to None
        direction: 1       # pretty self-explanatory, -1 or 1
        pulse_min: 1330    # extend. This sets max velocity. Increase until arm doesn't go faster --> valve fully open
        pulse_max: 1820    # retract. Max velocity in other direction
        deadzone: 0.0      # % per direction

        deadband_us_pos: 150.0 #pos/neg offsets from center (us)
        deadband_us_neg: 150.0 #if these match, your center value is prob correct :)

        dither_enable: True # dither on/off. Adds vibration to reduce valve stiction.
        dither_amp_us: 20.0 # dither amplitude in microseconds (us)
        dither_hz: 33.0     # dither frequency in Hz
        dither_taper: True # fade dither in after deadband edge
        dither_taper_us: 40.0

        ramp_enable: True    # linear slew limit on pulse changes
        ramp_limit: 1250.0    # lower = smoother, less overshoot
        ramp_skip_deadband: False  # if True, deadband jump is instant (slew only for usable range)
        gamma: 1.2          # curve shaping; <1 = more sensitive near center



    tilt_boom:
        output_channel: 4
        affects_pump: True
        toggleable: False
        center: 1500
        direction: 1
        pulse_min: 1260     # ret
        pulse_max: 1740     # ext
        deadzone: 0.0
        deadband_us_pos: 140.0
        deadband_us_neg: 140.0
        dither_enable: True
        dither_amp_us: 20.0 #25
        dither_hz: 33.0 # 33
        dither_taper: True
        dither_taper_us: 40.0
        ramp_enable: True
        ramp_limit: 1250.0
        ramp_skip_deadband: False
        gamma: 1.2

    scoop:
        output_channel: 2
        affects_pump: True
        toggleable: False
        center: 1410
        direction: -1
        pulse_min: 1190     # ext 1190
        pulse_max: 1630     # ret 1630
        deadzone: 0.0
        deadband_us_pos: 140.0 # ret
        deadband_us_neg: 140.0 # ext
        dither_enable: true
        dither_amp_us: 20.0
        dither_hz: 33.0
        dither_taper: True
        dither_taper_us: 40.0
        ramp_enable: True
        ramp_limit: 1250.0
        ramp_skip_deadband: False
        gamma: 1.0

    rotate:
        output_channel: 5
        affects_pump: False
        toggleable: False
        center: 1581
        direction: -1
        pulse_min: 1480 #1520
        pulse_max: 1680 #1640            #CW
        deadzone: 0.0
        deadband_us_pos: 45.0 #47.0
        deadband_us_neg: 42.0 #44.0
        dither_enable: False
        dither_amp_us: 2.0
        dither_hz: 20.0
        dither_taper: False
        dither_taper_us: 10.0
        ramp_enable: True
        ramp_limit: 250.0
        ramp_skip_deadband: True
        gamma: 1.5
